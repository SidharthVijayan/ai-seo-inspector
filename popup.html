<!DOCTYPE html>
<html>
<head>
  <title>AI SEO Inspector</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 15px;
      background: #0f172a;
      color: #fff;
    }

    h2 {
      font-size: 16px;
      color: #38bdf8;
      margin-bottom: 10px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .score {
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
    }

    .good { color: #22c55e; }
    .bad { color: #ef4444; }

    .item {
      font-size: 12px;
      margin: 4px 0;
    }
  </style>
</head>

<body>

  <h2>🔍 AI SEO Inspector</h2>

  <button id="analyzeBtn">Analyze Page</button>

  <div id="results"></div>

  <script src="popup.js"></script>

</body>
</html>
