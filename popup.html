<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI SEO Inspector</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 12px;
      width: 320px;
      background: #0f172a;
      color: #e2e8f0;
    }

    h1 {
      font-size: 16px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    h2 {
      font-size: 14px;
      margin-top: 15px;
      margin-bottom: 5px;
      border-bottom: 1px solid #334155;
      padding-bottom: 3px;
    }

    p {
      font-size: 13px;
      margin: 4px 0;
    }

    .score {
      font-weight: bold;
      font-size: 14px;
    }

    .low { color: #22c55e; }     /* green */
    .medium { color: #facc15; }  /* yellow */
    .high { color: #ef4444; }    /* red */

    .box {
      background: #1e293b;
      padding: 8px;
      border-radius: 6px;
      margin-top: 6px;
    }

    .suggestion {
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

  <h1>&#128269; AI SEO Inspector</h1>

  <!-- SEO SECTION -->
  <h2>SEO Overview</h2>
  <div class="box">
    <p>Score: <span id="seoScore" class="score">-</span></p>
  </div>

  <!-- PERSUASION -->
  <h2>🧠 Persuasion Analysis</h2>
  <div class="box">
    <p>Score: <span id="persuasionScore" class="score">-</span></p>
  </div>

  <!-- MANIPULATION -->
  <h2>🚨 Manipulation Risk</h2>
  <div class="box">
    <p>Level: <span id="manipulation" class="score">-</span></p>
  </div>

  <!-- BREAKDOWN -->
  <h2>Breakdown</h2>
  <div class="box">
    <p id="details">Analyzing...</p>
  </div>

  <!-- AI SUGGESTIONS -->
  <h2>💡 AI Suggestions</h2>
  <div class="box" id="suggestions">
    <p>Analyzing...</p>
  </div>

  <script src="popup.js"></script>

</body>
</html>
